---
x-common: &common
  networks:
  - opentelemetry-lab
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

services:
  otel-python:
    <<: *common
    build: ./apps/otel-python/
    ports:
    - "8000:8000"
    environment:
    - EXPOSE_PORT=8000
    - TARGET_ONE_SVC=http://otel-js:3001
    - TARGET_TWO_SVC=http://otel-java:8080
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-python
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-python,service.criticality=medium,service.version=v1.0.0
    command: "opentelemetry-instrument python main.py"


  otel-java:
    <<: *common
    build: ./apps/otel-java/
    container_name: otel-java
    ports:
    - "8080:8080"
    environment:
    - EXPOSE_PORT=8080
    - TARGET_ONE_SVC=http://otel-python:8000
    - TARGET_TWO_SVC=http://otel-js:3001
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-java
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-java,service.criticality=medium,service.version=v1.0.0
    command: "java -javaagent:/opentelemetry-javaagent.jar -jar /app.jar"


  otel-js:
    <<: *common
    build: ./apps/otel-js/
    container_name: otel-js
    ports:
    - "3001:3001"
    environment:
    - EXPOSE_PORT=3001
    - TARGET_ONE_SVC=http://otel-go:8888
    - TARGET_TWO_SVC=http://otel-rust:9999
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-js
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-js,service.criticality=medium,service.version=v1.0.0
    command: "node --require '@opentelemetry/auto-instrumentations-node/register' src/app.js"


  otel-rust:
    <<: *common
    build: ./apps/otel-rust/
    container_name: otel-rust
    ports:
    - "9999:9999"
    environment:
    - EXPOSE_PORT=9999
    - TARGET_ONE_SVC=http://otel-go:8888
    - TARGET_TWO_SVC=http://otel-python:8000
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-rust
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-rust,service.criticality=medium,service.version=v1.0.0
    # command: "otel-rust"


  otel-go:
    <<: *common
    build: ./apps/otel-go/
    container_name: otel-go
    ports:
    - "8888:8888"
    environment:
    - EXPOSE_PORT=8888
    - TARGET_ONE_SVC=http://otel-rust:9999
    - TARGET_TWO_SVC=http://otel-java:8080
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-go
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-go,service.criticality=medium,service.version=v1.0.0
    # command: "otel-go"


  otel-swift:
    <<: *common
    build: ./apps/otel-swift/
    container_name: otel-swift
    ports:
    - "9191:9191"
    environment:
    - EXPOSE_PORT=9191
    - TARGET_ONE_SVC=http://otel-rust:9999
    - TARGET_TWO_SVC=http://otel-js:3001
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-swift
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-swift,service.criticality=medium,service.version=v1.0.0
    - LOG_LEVEL=debug
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "9191"]

  otel-ts:
    <<: *common
    build: ./apps/otel-ts/
    container_name: otel-ts
    ports:
    - "3333:3333"
    environment:
    - EXPOSE_PORT=3333
    - TARGET_ONE_SVC=http://otel-go:8888
    - TARGET_TWO_SVC=http://otel-rust:9999
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-ts
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-ts,service.criticality=medium,service.version=v1.0.0
    command: "node --require '@opentelemetry/auto-instrumentations-node/register' dist/index.js"

  otel-react:
    <<: *common
    build: ./apps/otel-react/
    container_name: otel-react
    ports:
    - "3434:3434"
    environment:
    - PORT=3434
    - TARGET_ONE_SVC=http://otel-js:3001
    - TARGET_TWO_SVC=http://otel-java:8080
    # OpenTelemetry with GRPC
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    # OpenTelemetry with HTTP
    # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    # - OTEL_EXPORTER_OTLP_PROTOCOL=http/json
    - OTEL_SERVICE_NAME=otel-react
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-react,service.criticality=low,service.version=v1.0.0
    command: ""
