---
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  prometheus/collector:
    config:
      global:
        scrape_interval: 60s
      scrape_configs:
      - job_name: 'otel-collector'
        scrape_interval: 30s
        static_configs:
        - targets:
            - 127.0.0.1:8888

exporters:
  debug/metrics:
    verbosity: detailed
  debug/traces:
    verbosity: detailed
  debug/logs:
    verbosity: detailed

  otlphttp/victoriametrics:
    endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}
    tls:
      insecure: true
  otlphttp/victorialogs:
    logs_endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT}
    tls:
      insecure: true
  otlphttp/victoriatraces:
    traces_endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"
  pprof:
    endpoint: 0.0.0.0:1777

processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  memory_limiter:
    check_interval: 2s
    limit_mib: 1800
    spike_limit_mib: 500
  resourcedetection:
    detectors: [env, system]
    timeout: 2s

service:
  telemetry:
    logs:
      level: INFO
      encoding: json
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
  extensions:
    - health_check
    - pprof

  pipelines:
    logs:
      receivers:
      - otlp
      processors:
      - batch
      - attributes
      exporters:
      - debug/logs
      - otlphttp/victorialogs
    metrics:
      receivers:
      - otlp
      - prometheus/collector
      processors:
      - resourcedetection
      - batch
      exporters:
      - debug/metrics
      - otlphttp/victoriametrics
    traces:
      receivers:
      - otlp
      processors:
      - batch
      - attributes
      exporters:
      - debug/traces
      - otlphttp/victoriatraces
