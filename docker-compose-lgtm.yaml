---
x-common: &common
  networks:
  - opentelemetry-lab
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

services:
  otel-collector:
    <<: *common
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: otel
    command:
    - "--config=/conf/config.yaml"
    - "--feature-gates=service.profilesSupport"
    volumes:
    - ./etc/otel/otel-collector-lgtm.yaml:/conf/config.yaml
    ports:
    - "4317:4317" # OTLP gRPC receiver
    - "4318:4318" # OTLP http receiver
    - "8888:8888"
    - "8889:8889"
    environment:
    - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://loki:3100/otlp
    - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://prometheus:9090/api/v1/otlp
    - OTEL_EXPORTER_OTLP_PROFILES_ENDPOINT=http://pyroscope:9097
    - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://tempo:4318
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=otel-collector,service.criticality=low,service.version=0.147.0

  # alloy:
  #   image: grafana/alloy:v1.4.0
  #   container_name: alloy
  #   command:
  #   - "run"
  #   - "--server.http.listen-addr=0.0.0.0:12345"
  #   - '--config.extra-args="-config.expand-env"'
  #   - "/conf/config.alloy"
  #   volumes:
  #   - ./etc/alloy/config.alloy:/conf/config.alloy
  #   ports:
  #   - "12345:12345"
  #   environment:
  #   - ALLOY_PORT_APP_RECEIVER=12345
  #   networks:
  #   - opentelemetry-lab

  loki:
    <<: *common
    image: grafana/loki:3.6.7
    container_name: loki
    entrypoint: /usr/bin/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
    - ./etc/loki/config.yaml:/etc/loki/config.yaml
    - loki-data:/loki
    ports:
    - "3100:3100"
    environment:
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=loki,service.criticality=low,service.version=3.6.7

  tempo:
    <<: *common
    image: grafana/tempo:2.10.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
    - ./etc/tempo/config.yaml:/etc/tempo/config.yaml
    - tempo-data:/var/tempo
    ports:
    - "3417:4317" # OTLP gRPC receiver
    - "3418:4318" # OTLP http receiver
    environment:
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=tempo,service.criticality=low,service.version=2.10.1

  pyroscope:
    <<: *common
    image: grafana/pyroscope:1.18.1
    container_name: pyroscope
    command: ["-config.file=/etc/pyroscope/config.yaml"]
    volumes:
    - ./etc/pyroscope/config.yaml:/etc/pyroscope/config.yaml
    - pyroscope-data:/var/pyroscope
    ports:
    - "3097:9097"
    environment:
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=pyroscope,service.criticality=low,service.version=1.18.1

  prometheus:
    <<: *common
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    volumes:
    - ./etc/prometheus/prometheus.yml:/workspace/prometheus.yml
    command:
    - --config.file=/workspace/prometheus.yml
    - --web.enable-otlp-receiver
    ports:
    - "3090:9090"
    environment:
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=docker,service.name=prometheus,service.criticality=low,service.version=v3.9.1

  grafana:
    <<: *common
    image: grafana/grafana:12.4.0
    container_name: grafana
    volumes:
    - ./etc/grafana/dashboards-lgtm.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
    - ./etc/grafana/datasource-lgtm.yml:/etc/grafana/provisioning/datasources/datasource.yml
    - ./etc/grafana/dashboards/lgtm:/var/lib/grafana/dashboards
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "timeSeriesTable,traceqlEditor"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=docker,service.name=grafana,service.criticality=low,service.version=12.4.0"
    ports:
    - "3000:3000"

volumes:
  tempo-data:
  loki-data:
  pyroscope-data:
